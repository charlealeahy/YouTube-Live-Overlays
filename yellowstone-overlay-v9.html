<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yellowstone Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    width: 1920px;
    height: 1090px;
    overflow: hidden;
    position: relative;
  }
  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 75%, transparent 100%);
  }
  #branding { display: flex; align-items: center; gap: 16px; }
  #live-badge {
    display: flex; align-items: center; gap: 8px;
    background: #c62828; color: #fff;
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700;
    padding: 6px 14px 5px; border-radius: 4px; letter-spacing: 2.5px;
    box-shadow: 0 0 20px rgba(198,40,40,0.55);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #fff;
    animation: blink 1.4s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  #top-right { display: flex; align-items: center; gap: 16px; }
  #location-pill {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.38); border: 1px solid rgba(255,255,255,0.13);
    border-radius: 30px; padding: 8px 20px; font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.82); backdrop-filter: blur(8px);
  }
  .loc-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #e53935; box-shadow: 0 0 8px #e53935; flex-shrink: 0;
  }
  #clock {
    font-family: 'Rajdhani', sans-serif; font-size: 19px; font-weight: 600;
    color: rgba(255,255,255,0.92); background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    padding: 7px 16px; backdrop-filter: blur(8px); letter-spacing: 0.5px;
  }
  #bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(8,24,12,0.97) 0%, rgba(12,35,16,0.93) 55%, rgba(8,20,10,0.55) 82%, transparent 100%);
  }
  #bottom-bar::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(76,175,80,0.35) 20%, rgba(139,195,74,0.55) 50%, rgba(76,175,80,0.35) 80%, transparent 100%);
  }
  #bar-inner { display: flex; align-items: stretch; padding: 20px 28px 18px; gap: 0; min-height: 130px; }
  #facts-panel {
    display: flex; flex-direction: column; justify-content: center;
    min-width: 380px; max-width: 380px; margin-right: 28px; padding-right: 28px;
    border-right: 1px solid rgba(139,195,74,0.2);
  }
  #fact-text { font-size: 19px; font-weight: 700; color: #ff9800; line-height: 1.5; transition: opacity 0.8s ease; }
  #fact-text.fade { opacity: 0; }
  #stats-middle { display: flex; align-items: center; flex: 1; gap: 0; }
  .stat-block {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 0 16px; border-right: 1px solid rgba(255,255,255,0.07); flex: 1;
  }
  .stat-block:last-child { border-right: none; }
  .stat-label { font-size: 11px; font-weight: 700; color: rgba(139,195,74,0.8); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; white-space: nowrap; }
  .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; color: #e8f5e9; line-height: 1; text-align: center; white-space: nowrap; }
  .seismic-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4caf50; margin-right: 6px; vertical-align: middle; box-shadow: 0 0 8px #4caf50; }
  #eruption-block {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(229,57,53,0.22), rgba(180,30,30,0.1));
    border: 1px solid rgba(229,57,53,0.45); border-radius: 10px;
    padding: 14px 28px; margin-left: 28px; min-width: 190px;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  #eruption-block::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #e53935, transparent); }
  #eruption-label { font-size: 11px; font-weight: 700; color: #ef9a9a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  #eruption-countdown { font-family: 'Rajdhani', sans-serif; font-size: 56px; font-weight: 700; color: #ffcc02; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: 3px; text-shadow: 0 0 24px rgba(255,204,2,0.4); width: 140px; text-align: center; }
  #last-eruption { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px; }
  #accent-line { height: 3px; background: linear-gradient(90deg, #1b5e20 0%, #4caf50 25%, #8bc34a 50%, #4caf50 75%, #1b5e20 100%); }
  #stream-video { position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; object-fit: cover; z-index: -1; }
</style>
</head>
<body>
 
<video id="stream-video" autoplay muted playsinline></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  const video = document.getElementById('stream-video');
  const streamUrl = 'https://cs7.pixelcaster.com/nps/faithful.stream/playlist_dvr.m3u8';
  let hls;
  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamUrl;
  }
</script>
 
<div id="top-bar">
  <div id="branding">
    <div id="live-badge"><span class="live-dot"></span>LIVE</div>
  </div>
  <div id="top-right">
    <div id="location-pill">
      <span class="loc-dot"></span>
      Old Faithful &nbsp;·&nbsp; Upper Geyser Basin &nbsp;·&nbsp; Yellowstone National Park &nbsp;·&nbsp; Wyoming, USA
    </div>
    <div id="clock">--:--:-- MDT</div>
  </div>
</div>
 
<div id="bottom-bar">
  <div id="bar-inner">
    <div id="facts-panel">
      <div id="fact-text">Loading...</div>
    </div>
    <div id="stats-middle">
      <div class="stat-block">
        <div class="stat-label"><span class="seismic-dot" id="seismic-dot"></span>Seismic</div>
        <div class="stat-value" id="seismic-status">--</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">🌍 Last Quake</div>
        <div class="stat-value" id="last-quake">--</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">🌡️ Temp</div>
        <div class="stat-value" id="temperature">--°F</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">💨 Wind</div>
        <div class="stat-value" id="wind">-- mph</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">💧 Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">☀️ UV Index</div>
        <div class="stat-value" id="uv">--</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">🔥 Per Day</div>
        <div class="stat-value">~20</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">📏 Max Height</div>
        <div class="stat-value">184 ft</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">⛰️ Elevation</div>
        <div class="stat-value">7,349 ft</div>
      </div>
    </div>
    <div id="eruption-block">
      <div id="eruption-label">🌋 Next Eruption</div>
      <div id="eruption-countdown">--:--</div>
      <div id="last-eruption">Last: --</div>
    </div>
  </div>
  <div id="accent-line"></div>
</div>
 
<script>
  function updateClock() {
    const now = new Date();
    const mdt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Denver' }));
    const h = String(mdt.getHours()).padStart(2,'0');
    const m = String(mdt.getMinutes()).padStart(2,'0');
    const s = String(mdt.getSeconds()).padStart(2,'0');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('clock').textContent =
      `${days[mdt.getDay()]} ${mdt.getDate()} ${months[mdt.getMonth()]} ${mdt.getFullYear()}  -  ${h}:${m}:${s} MDT`;
  }
  setInterval(updateClock, 1000);
  updateClock();
 
  let nextEruptionMs = null;
 
  async function fetchEruptionData() {
    try {
      const res = await fetch('https://www.geysertimes.org/api/v5/predictions_latest/old+faithful');
      const data = await res.json();
      const predictions = data.predictions;
      if (predictions && predictions.length > 0) {
        const p = predictions[0];
        nextEruptionMs = p.prediction * 1000;
        const lastTime = new Date(p.lastReportTime * 1000);
        const lastMDT = new Date(lastTime.toLocaleString('en-US', { timeZone: 'America/Denver' }));
        const lh = String(lastMDT.getHours()).padStart(2,'0');
        const lm = String(lastMDT.getMinutes()).padStart(2,'0');
        document.getElementById('last-eruption').textContent = `Last: ${lh}:${lm} MDT`;
        return;
      }
    } catch(e) {}
    try {
      const res = await fetch('https://www.geysertimes.org/api/v5/entries_latest/old+faithful');
      const data = await res.json();
      const entries = data.entries;
      if (entries && entries.length > 0) {
        const last = entries[0];
        const lastTime = new Date(last.time * 1000);
        const duration = parseInt(last.duration) || 0;
        const intervalMin = duration > 0 && duration < 180 ? 65 : 91;
        nextEruptionMs = lastTime.getTime() + (intervalMin * 60 * 1000);
        const lastMDT = new Date(lastTime.toLocaleString('en-US', { timeZone: 'America/Denver' }));
        const lh = String(lastMDT.getHours()).padStart(2,'0');
        const lm = String(lastMDT.getMinutes()).padStart(2,'0');
        document.getElementById('last-eruption').textContent = `Last: ${lh}:${lm} MDT`;
      }
    } catch(e) {
      if (!nextEruptionMs) {
        nextEruptionMs = Date.now() + (45 * 60 * 1000);
        document.getElementById('last-eruption').textContent = 'Awaiting data...';
      }
    }
  }
 
  function updateCountdown() {
    if (!nextEruptionMs) return;
    const diff = nextEruptionMs - Date.now();
    const el = document.getElementById('eruption-countdown');
    if (diff <= 0) {
      el.textContent = 'NOW!';
      el.style.color = '#e53935';
      setTimeout(fetchEruptionData, 5 * 60 * 1000);
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    const mm = String(Math.floor(totalSec / 60)).padStart(2,'0');
    const ss = String(totalSec % 60).padStart(2,'0');
    el.textContent = `${mm}:${ss}`;
    el.style.color = diff < 5 * 60 * 1000 ? '#ff6b6b' : '#ffcc02';
  }
 
  fetchEruptionData();
  setInterval(fetchEruptionData, 5 * 60 * 1000);
  setInterval(updateCountdown, 1000);
 
  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.4605&longitude=-110.8281&current=temperature_2m,relative_humidity_2m,wind_speed_10m,uv_index&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FDenver');
      const data = await res.json();
      const c = data.current;
      document.getElementById('temperature').textContent = `${Math.round(c.temperature_2m)}°F`;
      document.getElementById('wind').textContent = `${Math.round(c.wind_speed_10m)} mph`;
      document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
      document.getElementById('uv').textContent = c.uv_index ?? '--';
    } catch(e) {}
  }
  fetchWeather();
  setInterval(fetchWeather, 10 * 60 * 1000);
 
  async function fetchSeismic() {
    try {
      const url = 'https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=' +
        new Date(Date.now() - 24*3600*1000).toISOString() +
        '&maxlatitude=45&minlatitude=44&maxlongitude=-110&minlongitude=-111.5&minmagnitude=0&orderby=time&limit=1';
      const data = await (await fetch(url)).json();
      const dot = document.getElementById('seismic-dot');
      const status = document.getElementById('seismic-status');
      if (data.features?.length > 0) {
        const q = data.features[0];
        const mag = parseFloat(q.properties.mag).toFixed(1);
        const depth = parseFloat(q.geometry.coordinates[2]).toFixed(1);
        document.getElementById('last-quake').textContent = `M${mag} ${depth}km`;
        const elevated = mag >= 3;
        dot.style.background = elevated ? '#e53935' : '#4caf50';
        dot.style.boxShadow = elevated ? '0 0 8px #e53935' : '0 0 8px #4caf50';
        status.textContent = elevated ? 'Elevated' : 'Normal';
      } else {
        document.getElementById('last-quake').textContent = 'None';
        dot.style.background = '#4caf50';
        dot.style.boxShadow = '0 0 8px #4caf50';
        status.textContent = 'Normal';
      }
    } catch(e) {}
  }
  fetchSeismic();
  setInterval(fetchSeismic, 5 * 60 * 1000);
 
  const facts = [
    "Old Faithful has erupted more reliably than any other large geyser on Earth since its discovery in 1870.",
    "Yellowstone sits atop one of the world's largest supervolcanoes. Its magma chamber spans 55 x 18 miles beneath the surface.",
    "Old Faithful discharges up to 8,400 gallons of boiling water per eruption at temperatures reaching 204°F.",
    "Yellowstone is home to more than half of all the world's geysers - over 500 in total.",
    "The park covers 3,472 square miles across Wyoming, Montana and Idaho - larger than Rhode Island and Delaware combined.",
    "Yellowstone's supervolcano last erupted 640,000 years ago - 1,000 times more powerful than Mount St. Helens.",
    "The park has the largest concentration of mammals in the lower 48 states, including bison, grizzly bears and grey wolves.",
    "Scientists can predict Old Faithful's next eruption within a 10-minute window based on the previous eruption's duration.",
    "Beneath Yellowstone, a massive plume of molten rock rises from deep within the Earth's mantle.",
    "Watch live cameras from 90+ countries free at EarthLive.TV - no sign-up required."
  ];
 
  let factIndex = 0;
  const factEl = document.getElementById('fact-text');
 
  function showNextFact() {
    factEl.classList.add('fade');
    setTimeout(() => {
      factIndex = (factIndex + 1) % facts.length;
      factEl.textContent = facts[factIndex];
      factEl.classList.remove('fade');
    }, 800);
  }
 
  factEl.textContent = facts[0];
  setInterval(showNextFact, 8000);
 
  // AUTO-RESTART VIDEO IF STALLED
  setInterval(() => {
    if (video.readyState >= 2 && video.paused) {
      video.play();
    }
    if (video.readyState < 2 && hls) {
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
    }
  }, 10000);
</script>
</body>
</html>
